name: Rooster ophalen

on:
  schedule:
    - cron: '0,30 4-16 * * 1-5'
  workflow_dispatch:

jobs:
  fetch-rooster:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Chromium dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libatk-bridge2.0-0 libatk1.0-0 libcups2 libdrm2 libgbm1 \
            libnss3 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libxss1 libxtst6 fonts-liberation xdg-utils

      - name: Install Node dependencies
        run: npm ci

      - name: Rooster ophalen
        env:
          EDUFLEX_USER: ${{ secrets.EDUFLEX_USER }}
          EDUFLEX_PASS: ${{ secrets.EDUFLEX_PASS }}
        run: npm run fetch

      - name: Commit en push rooster.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rooster.json
          git diff --staged --quiet || git commit -m "🗓️ Rooster bijgewerkt $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
