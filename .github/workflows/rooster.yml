name: Rooster ophalen

on:
  schedule:
    - cron: '0,30 4-16 * * 1-5'
  workflow_dispatch:

jobs:
  fetch-rooster:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rooster ophalen
        run: node fetch-all.js

      - name: Commit en push rooster.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rooster.json
          git diff --staged --quiet || git commit -m "🗓️ Rooster bijgewerkt $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
